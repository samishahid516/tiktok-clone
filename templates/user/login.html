{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in | TikTok</title>
    <link rel="icon" type="image/png" href="{% static 'images/logo.png' %}">
    <link rel="stylesheet" href="{% static 'src/output.css' %}">
    <script defer src="{% static 'src/alpine.min.js' %}"></script>
    <style>
        html, body { height: 100%; margin: 0; }
        body { display: flex; flex-direction: column; min-height: 100vh; }
        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 0; overflow-y: auto; }
        main::-webkit-scrollbar { width: 6px; }
        main::-webkit-scrollbar-track { background: transparent; }
        main::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
        main::-webkit-scrollbar-thumb:hover { background: #aaa; }
        footer { flex-shrink: 0; }
    </style>
</head>
<body>
    <header class="sticky top-0 z-10 bg-white">
        <div class="flex items-center justify-between px-4 py-2">
            <div class="flex items-center gap-4">
                <a href="{% url 'index' %}">
                    <img src="{% static 'tiktok.png' %}" class="h-9">
                </a>
            </div>
            <a href="" class="text-neutral-500 hover:text-black hover:underline flex items-center gap-1 text-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                Feedback and help
            </a>
        </div>
    </header>

    <main>
        <div class="w-full max-w-sm mx-auto px-6">
            <h1 class="text-2xl font-bold text-center mb-1 text-black py-2">Log in</h1>
            <p class="text-sm text-black">Enter your email or username</p>

            {% if success %}
                <p class="text-green-600 text-sm mt-2">{{ success }}</p>
            {% endif %}
            {% if error %}
                <p class="text-red-500 text-sm mt-2">{{ error }}</p>
            {% endif %}

            <form method="POST" action="{% url 'login' %}" class="flex flex-col gap-4">
                {% csrf_token %}
                <div>
                    <input type="text" name="username" placeholder="Email or username" class="w-full p-3.5 rounded-lg border border-neutral-300 text-sm focus:outline-none focus:border-black">
                </div>
                <div>
                    <div class="relative">
                        <input type="password" name="password" placeholder="Password" class="w-full p-3.5 rounded-lg border border-neutral-300 text-sm focus:outline-none focus:border-black pr-12">
                    </div>
                </div>
                <button type="submit" class="w-full p-3.5 rounded-lg font-semibold text-sm bg-rose-500 text-white cursor-pointer hover:bg-rose-600 transition-colors">Log in</button>
                <a href="{% url 'index' %}" class="text-center text-sm text-black hover:underline">&lt; Go back</a>
            </form>
        </div>
    </main>

    <footer>
        <div class="text-center text-xs text-neutral-400 border-t border-neutral-300 px-4 py-6">
            <p>Don't have an account? <a href="{% url 'signup' %}" class="text-rose-500 font-semibold hover:underline">Sign up</a></p>
        </div>
        <div class="bg-black text-center text-neutral-400 flex items-center justify-center text-xs h-8">
            <p>© 2026 TikTok</p>
        </div>
    </footer>
</body>
</html>
