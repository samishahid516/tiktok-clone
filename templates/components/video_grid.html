<template x-if="{{ list_name }}.length">
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-3 lg:grid-cols-4 gap-3">
        <template x-for="post in {{ list_name }}" :key="post.id">
            <div class="relative bg-neutral-100 dark:bg-neutral-800 rounded-lg overflow-hidden cursor-pointer" @click="window.location.href='/post/' + post.id + '/' x-data="{ vpaused: false }">
                <div class="aspect-[9/16] relative">
                    <template x-if="post.has_video && post.video_url">
                        <div class="absolute inset-0">
                            <audio :src="post.soundtrack_url" loop preload="auto" x-show="post.soundtrack_url" x-ref="saudio"></audio>
                            <video :src="post.video_url" class="absolute inset-0 w-full h-full object-cover" loop muted playsinline @mouseenter="vpaused = false; $el.play()" @mouseleave="$el.pause(); $el.currentTime = 0; vpaused = true" @play="vpaused = false" @pause="vpaused = true"></video>
                            <div x-show="vpaused" class="absolute inset-0 z-10 flex items-center justify-center pointer-events-none">
                                <svg class="w-10 h-10 text-white/80" fill="currentColor" viewBox="0 0 48 48"><path d="M24 44c11.05 0 20-8.95 20-20S35.05 4 24 4 4 12.95 4 24s8.95 20 20 20Zm-3.5-12.38a1.5 1.5 0 0 1-2.5-1.13v-12.98a1.5 1.5 0 0 1 2.5-1.13l9.04 6.5a1.5 1.5 0 0 1 0 2.26l-9.04 6.48Z"/></svg>
                            </div>
                        </div>
                    </template>
                    <template x-if="!post.has_video && post.image_url">
                        <img :src="post.image_url" class="absolute inset-0 w-full h-full object-cover">
                    </template>
                </div>
                <div class="absolute bottom-1 left-1 flex items-center gap-2 text-white text-[10px] z-10">
                    <span class="flex items-center gap-0.5 bg-black/40 px-1.5 py-0.5 rounded">
                        <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z"/></svg>
                        <span x-text="post.likes"></span>
                    </span>
                    <span class="flex items-center gap-0.5 bg-black/40 px-1.5 py-0.5 rounded">
                        <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18Zm0-2.25a6.75 6.75 0 1 1 0-13.5 6.75 6.75 0 0 1 0 13.5ZM12 6a.75.75 0 0 1 .75.75v5.25h3.75a.75.75 0 0 1 0 1.5h-4.5a.75.75 0 0 1-.75-.75v-6A.75.75 0 0 1 12 6Z"/></svg>
                        <span x-text="post.comments"></span>
                    </span>
                </div>
            </div>
        </template>
    </div>
</template>
<template x-if="!{{ list_name }}.length">
    <div class="text-center py-16 text-neutral-400">
        {% if empty_icon == 'star' %}
        <svg class="w-16 h-16 mx-auto mb-4 text-neutral-300 dark:text-neutral-600" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><path d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z"/></svg>
        {% elif empty_icon == 'heart' %}
        <svg class="w-16 h-16 mx-auto mb-4 text-neutral-300 dark:text-neutral-600" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><path d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z"/></svg>
        {% else %}
        <svg class="w-16 h-16 mx-auto mb-4 text-neutral-300 dark:text-neutral-600" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><path d="M15.75 10.5l4.72-4.72a.75.75 0 011.28.53v11.38a.75.75 0 01-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 002.25-2.25v-9a2.25 2.25 0 00-2.25-2.25h-9A2.25 2.25 0 002.25 7.5v9a2.25 2.25 0 002.25 2.25z"/></svg>
        {% endif %}
        <p class="font-semibold">{{ empty_title }}</p>
        <p class="text-sm mt-1">{{ empty_text }}</p>
    </div>
</template>
