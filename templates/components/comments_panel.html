<div x-show="showComments" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 translate-x-8" x-transition:enter-end="opacity-100 translate-x-0" x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100 translate-x-0" x-transition:leave-end="opacity-0 translate-x-8" class="fixed right-0 top-0 h-full w-[380px] max-w-full z-40 bg-white dark:bg-neutral-900 shadow-2xl border-l border-neutral-200 dark:border-neutral-700 flex flex-col" @click.away="showComments = false; comments = []">
    <div class="flex items-center justify-between px-4 py-3 border-b border-neutral-200 dark:border-neutral-700">
        <h2 class="font-semibold dark:text-white text-base" x-text="comments.length + ' Comments'"></h2>
        <button @click="showComments = false; comments = []" class="p-1 hover:bg-neutral-100 dark:hover:bg-neutral-800 rounded-full transition-colors dark:text-white">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
    </div>
    <div class="flex-1 overflow-y-auto hide-scrollbar px-4 py-3 space-y-4">
        <template x-for="c in comments" :key="c.id">
            <div>
                <div class="flex gap-2">
                    <div class="w-8 h-8 rounded-full bg-neutral-300 dark:bg-neutral-600 flex items-center justify-center text-xs font-bold shrink-0 dark:text-white" x-text="c.username.charAt(0).toUpperCase()"></div>
                    <div class="flex-1 min-w-0">
                        <p class="text-xs font-semibold dark:text-white" x-text="c.username"></p>
                        <p class="text-sm dark:text-neutral-300" x-text="c.text"></p>
                        <div class="flex items-center gap-3 mt-1 text-xs text-neutral-400">
                            <button @click="c.showReplies = !c.showReplies" class="hover:font-semibold" x-text="c.reply_count + ' replies'" x-show="c.reply_count > 0"></button>
                            <button @click="toggleCommentLike(c)" class="flex items-center gap-0.5 hover:text-red-500" :class="c.liked ? 'text-red-500' : ''">
                                <svg class="w-3.5 h-3.5" :class="c.liked ? 'fill-current' : ''" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z"/></svg>
                                <span x-text="c.likes"></span>
                            </button>
                            <button @click="c.showReply = !c.showReply; c.replyText = ''" class="hover:font-semibold">Reply</button>
                            <button x-show="c.is_mine" @click="fetch('/post/comment/' + c.id + '/delete/', { method: 'POST', headers: { 'X-CSRFToken': csrfToken } }).then(r => r.json()).then(d => { if (d.success) comments.splice(comments.indexOf(c), 1) })" class="hover:text-red-500 transition-colors ml-auto">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
                            </button>
                        </div>
                        <div x-show="c.showReply" class="mt-2 flex gap-2">
                            <input x-model="c.replyText" @keydown.enter="submitReply(c)" type="text" placeholder="Write a reply..." class="flex-1 bg-neutral-100 dark:bg-neutral-800 border border-neutral-300 dark:border-neutral-600 rounded-full px-3 py-1.5 text-xs focus:outline-none dark:text-white dark:placeholder-neutral-400">
                            <button @click="submitReply(c)" :disabled="!c.replyText?.trim()" class="bg-rose-500 text-white text-[10px] font-semibold px-3 py-1.5 rounded-full hover:bg-rose-600 disabled:opacity-50 transition-colors">Post</button>
                        </div>
                        <template x-if="c.showReplies">
                            <div class="mt-2 ml-2 pl-3 border-l-2 border-neutral-200 dark:border-neutral-700 space-y-2">
                                <template x-for="r in c.replies" :key="r.id">
                                    <div class="flex gap-2">
                                        <div class="w-6 h-6 rounded-full bg-neutral-300 dark:bg-neutral-600 flex items-center justify-center text-[10px] font-bold shrink-0 dark:text-white" x-text="r.username.charAt(0).toUpperCase()"></div>
                                        <div class="flex-1 min-w-0">
                                            <p class="text-xs font-semibold dark:text-white" x-text="r.username"></p>
                                            <p class="text-sm dark:text-neutral-300" x-text="r.text"></p>
                                            <div class="flex items-center gap-3 mt-1 text-xs text-neutral-400">
                                                <button @click="toggleCommentLike(r)" class="flex items-center gap-0.5 hover:text-red-500" :class="r.liked ? 'text-red-500' : ''">
                                                    <svg class="w-3 h-3" :class="r.liked ? 'fill-current' : ''" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z"/></svg>
                                                    <span x-text="r.likes"></span>
                                                </button>
                                                <button x-show="r.is_mine" @click="fetch('/post/comment/' + r.id + '/delete/', { method: 'POST', headers: { 'X-CSRFToken': csrfToken } }).then(r => r.json()).then(d => { if (d.success) c.replies.splice(c.replies.indexOf(r), 1); if (c.reply_count > 0) c.reply_count-- })" class="hover:text-red-500 transition-colors">
                                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </template>
        <template x-if="!comments.length">
            <div class="text-center py-10 text-neutral-400 dark:text-neutral-500">
                <p class="text-sm font-semibold">No comments yet</p>
                <p class="text-xs mt-1">Be the first to comment.</p>
            </div>
        </template>
    </div>
    <div class="border-t border-neutral-200 dark:border-neutral-700 p-3">
        <div class="flex gap-2">
            <input x-model="commentText" @keydown.enter="submitComment()" type="text" placeholder="Add a comment..." class="flex-1 bg-neutral-100 dark:bg-neutral-800 border border-neutral-300 dark:border-neutral-600 rounded-full px-3 py-2 text-sm focus:outline-none dark:text-white dark:placeholder-neutral-400">
            <button @click="submitComment()" :disabled="!commentText.trim()" class="bg-rose-500 text-white text-xs font-semibold px-4 py-2 rounded-full hover:bg-rose-600 disabled:opacity-50 transition-colors">Post</button>
        </div>
    </div>
</div>
<div x-show="showComments" class="fixed inset-0 bg-black/30 z-30" @click="showComments = false; comments = []"></div>
