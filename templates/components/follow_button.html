<button @click="toggleFollow(user, $el)"
        class="shrink-0 px-5 py-1.5 text-sm font-semibold rounded-full transition-colors
        {% if is_following %}
            bg-neutral-100 dark:bg-neutral-700 text-black dark:text-white hover:bg-red-50 dark:hover:bg-red-900/20 hover:text-red-500 border border-neutral-300 dark:border-neutral-600
        {% else %}
            bg-rose-500 text-white hover:bg-rose-600
        {% endif %}
        ">{% if is_following %}Following{% else %}Follow{% endif %}</button>
