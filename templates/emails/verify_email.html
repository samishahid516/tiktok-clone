<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body style="margin:0;padding:0;background-color:#f5f5f5;font-family:Arial,sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0">
        <tr>
            <td align="center" style="padding:40px 0;">
                <table width="480" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:16px;overflow:hidden;">
                    <tr>
                        <td align="center" style="padding:40px 40px 20px;">
                            <img src="https://upload.wikimedia.org/wikipedia/en/thumb/a/a9/TikTok_logo.svg/320px-TikTok_logo.svg.png" alt="TikTok" height="32" style="display:block;">
                        </td>
                    </tr>
                    <tr>
                        <td align="center" style="padding:0 40px;">
                            <h1 style="font-size:24px;margin:0 0 8px;">Your verification code</h1>
                            <p style="font-size:14px;color:#666;margin:0 0 24px;">Hi {{ user.username }}, enter this code on the verification page to activate your TikTok account.</p>
                            <div style="background-color:#f5f5f5;border-radius:12px;padding:20px;margin:0 0 24px;">
                                <span style="font-size:36px;font-weight:bold;letter-spacing:8px;color:#fe2c55;">{{ code }}</span>
                            </div>
                            <p style="font-size:12px;color:#999;margin:0;">This code expires once used. If you didn't create this account, you can ignore this email.</p>
                        </td>
                    </tr>
                    <tr>
                        <td align="center" style="padding:30px 40px;border-top:1px solid #eee;font-size:12px;color:#999;">
                            &copy; 2026 TikTok
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
